<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Who - Fandom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="img/logo.png" alt="Guess Who" class="logo-title">
    <p> Habe Spaß mit deinen Freunden! </p>
</header>

<main>
    <section class="fandom-section">
        <h2>1. Fandoms</h2>
        <div class="fandom-grid">

            <div class="fandom-card" data-fandom="acnh">
                <img src="img/acnh.jpg" alt="Animal Crossing: New Horizons">
                <div class="card-overlay">
                    <h3>Animal Crossing</h3>
                </div>
            </div>

            <div class="fandom-card" data-fandom="disney">
                <img src="img/disney.jpg" alt="Disney">
                <div class="card-overlay">
                    <h3>Disney</h3>
                </div>
            </div>

            <div class="fandom-card" data-fandom="genshin">
                <img src="placeholder.jpg" alt="Genshin Impact">
                <div class="card-overlay">
                    <h3>Genshin Impact</h3>
                </div>
            </div>

            <div class="fandom-card" data-fandom="mlbb">
                <img src="placeholder.jpg" alt="Mobile Legends: Bang Bang">
                <div class="card-overlay">
                    <h3>Mobile Legends: Bang Bang</h3>
                </div>
            </div>

            <div class="fandom-card" data-fandom="mha">
                <img src="placeholder.jpg" alt="My Hero Academia">
                <div class="card-overlay">
                    <h3>My Hero Academia</h3>
                </div>
            </div>

            <div class="fandom-card" data-fandom="pokemon">
                <img src="placeholder.jpg" alt="Pokémon">
                <div class="card-overlay">
                    <h3>Pokémon</h3>
                </div>
            </div>

        </div>
    </section>

    <section class="lobby-section">
        <h2>2. Lobby</h2>

        <div class="lobby-container">
            <div class="lobby-box">
                <h3>Raum erstellen</h3>
                <p>Wähle ein Fandom und klicke auf Erstellen.</p>
                <button id="btn-create-room" class="btn">Erstellen</button>
            </div>

            <div class="divider">oder</div>

            <div class="lobby-box">
                <h3>Raum beitreten</h3>
                <input type="text" id="room-code-input" placeholder="Code eingeben (z.B. AB12)">
                <button id="btn-join-room" class="btn btn-secondary">Beitreten</button>
            </div>
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
