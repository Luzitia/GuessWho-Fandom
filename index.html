<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Who - Online Lobby</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="menu-container" class="container">
    <h1>Guess Who - Online Lobby</h1>

    <div class="menu-box">
        <h2>1. Neuen Raum erstellen (Host)</h2>

        <label for="theme-select">Welches Thema?</label>
        <select id="theme-select">
            <option value="genshin">Genshin Impact</option>
            <option value="crossing">Animal Crossing</option>
        </select>

        <button id="create-room-btn" class="big-btn">Raum erstellen & beitreten</button>
    </div>

    <div style="text-align: center; margin: 15px; font-weight: bold; font-size: 1.2rem;">- ODER -</div>

    <div class="menu-box">
        <h2>2. Bestehendem Raum beitreten</h2>

        <label for="room-input">Raum-Code (ID):</label>
        <input type="text" id="room-input" placeholder="Z.B. 4821" style="padding: 10px; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc;">

        <button id="join-room-btn" class="big-btn" style="background-color: #2ecc71;">Raum beitreten</button>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
