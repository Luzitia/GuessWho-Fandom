<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Who - Spiel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container" class="container">
    <header>
        <div>
            <h1 id="player-title">Spieler ?</h1>
            <div id="room-display" style="font-size: 0.9rem; opacity: 0.7;">Raum-Code: Laden...</div>
        </div>
        <div id="opponent-counter">Gegner hat noch ?/4 Karten offen</div>
        <a href="index.html" id="leave-btn">Verlassen</a>
    </header>

    <div id="status-banner">Lädt Online-Sitzung...</div>

    <div id="game-layout">
        <div id="sidebar">
            <div id="secret-card-container">
                <h3>Dein geheimer Charakter:</h3>
                <div id="secret-card" class="card empty">Wähle...</div>
            </div>

            <button id="global-guess-btn" class="big-btn" disabled>🚨 Charakter erraten / Lösen</button>
        </div>

        <div id="main-board">
            <h2>Spielfeld</h2>
            <div id="board"></div>
        </div>
    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
